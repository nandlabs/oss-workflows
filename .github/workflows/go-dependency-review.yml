name: "Dependency Review"

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: "Minimum severity level to fail on"
        required: false
        type: string
        default: "moderate"
      allow-licenses:
        description: "Comma-separated list of allowed licenses"
        required: false
        type: string
        default: "MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, LicenseRef-scancode-google-patent-license-golang"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          comment-summary-in-pr: always
          allow-licenses: ${{ inputs.allow-licenses }}
