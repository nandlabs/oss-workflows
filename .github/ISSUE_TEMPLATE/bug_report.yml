name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in a reusable workflow
title: "[BUG]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much detail as possible to help us investigate.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Is there an existing issue for this?
      description: Please search existing issues before creating a new one.
      options:
        - label: I have searched the existing issues and none match my bug report.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: input
    id: workflow
    attributes:
      label: Affected Workflow
      description: "Which reusable workflow is affected?"
      placeholder: "e.g., go-ci.yml, release.yml"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide the caller workflow configuration or steps to reproduce the issue.
      placeholder: |
        1. Reference workflow '...' with inputs '...'
        2. Trigger workflow via '...'
        3. See error in step '...'
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: caller-workflow
    attributes:
      label: Caller Workflow Snippet
      description: If applicable, provide the relevant section of your caller workflow.
      render: yaml
      placeholder: |
        jobs:
          ci:
            uses: nandlabs/oss-workflows/.github/workflows/go-ci.yml@main
            with:
              go-version: "1.22"

  - type: textarea
    id: error-output
    attributes:
      label: Error Output / Logs
      description: If applicable, paste any relevant error messages or workflow run logs.
      render: shell

  - type: input
    id: runner
    attributes:
      label: Runner Environment
      description: "What runner is the workflow executing on?"
      placeholder: "e.g., ubuntu-latest, macos-latest, self-hosted"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or workflow run links about the problem here.
