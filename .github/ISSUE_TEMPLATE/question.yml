name: "❓ Question / Support"
description: Ask a question or request help using the reusable workflows
title: "[QUESTION]: "
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help! Please provide as much detail as possible.

        > **Note:** For security-related questions, please refer to our [Security Policy](../../SECURITY.md) instead.

  - type: checkboxes
    id: existing-resources
    attributes:
      label: Have you checked existing resources?
      description: Please verify you've checked these before asking.
      options:
        - label: I have read the README and documentation.
          required: true
        - label: I have searched existing issues for my question.
          required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Describe your question in detail...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context, workflow configuration, or logs that relate to your question.
      placeholder: Add any context here...

  - type: textarea
    id: workflow-snippet
    attributes:
      label: Workflow Snippet (if applicable)
      description: If your question involves a specific workflow configuration, provide the relevant section.
      render: yaml

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about your question here.
